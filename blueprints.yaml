name: Admin Helios Refresh
type: plugin
version: 1.0.0
description: "A Helios-inspired Admin Panel refresh: zinc dark nav, accessible blues, muted purple accent, rounded corners, and subtle shadows."
icon: paint-brush
author:
  name: HibbittsDesign.org
  email: paul@hibbittsdesign.org
  url: https://hibbittsdesign.org
homepage: https://github.com/hibbitts-design/grav-plugin-admin-helios-refresh
docs: https://github.com/hibbitts-design/grav-plugin-admin-helios-refresh/blob/main/README.md
keywords: grav, admin, helios, refresh, ui
bugs: https://github.com/hibbitts-design/grav-plugin-admin-helios-refresh/issues
license: MIT

dependencies:
  - { name: grav, version: '>=1.7.0' }

form:
  validation: loose
  fields:
    enabled:
      type: toggle
      label: PLUGIN_ADMIN.PLUGIN_STATUS
      highlight: 1
      default: 0
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool

    admin_panel_section:
      type: section
      title: 'Admin Panel'
      underline: true

    admin_styling_enhancements:
      type: toggle
      label: 'Helios-inspired Admin Styling'
      help: 'Apply Helios-inspired styling enhancements to the Admin Panel (rounded corners, transitions, shadows, focus rings, table row hover, sidebar accent).'
      highlight: 1
      default: 1
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool

    admin_font_size:
      type: select
      label: 'Admin Font Size'
      help: 'Choose the font size scale for the Admin Panel body, form elements, toolbar, and Editor Pro.'
      default: 'large'
      options:
        default: 'Default (admin built-in)'
        large: 'Large'
        larger: 'Larger'
